<!doctype html>
<html lang="en" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{PAGE_TITLE}} — {{REPORT_TITLE}}</title>
  <link rel="stylesheet" href="./assets/tailwind.css" />
  <link rel="stylesheet" href="./assets/report.css" />
  <script defer src="./site-nav.js"></script>
  <script defer src="./assets/report.js"></script>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 antialiased">

<!-- The chrome is rendered by report.js from site-nav.js + this page's
     sections. You only write: site-nav.js (once), the <title> above, and the
     <main> content below — each <header>/<section> with an id + data-toc. -->
<div class="ps-shell">

  <!-- ===================== SIDEBAR (the "Spine") ===================== -->
  <aside class="ps-sidebar" data-sidebar>
    <a class="ps-brand" href="./index.html" data-brand></a>     <!-- filled from site-nav.js -->
    <nav class="ps-nav" data-nav aria-label="Contents"></nav>   <!-- the page tree, derived -->
    <div class="ps-foot">
      <button class="ps-jump" data-jump aria-keyshortcuts="/">
        <svg class="ps-icon-sm" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M13 13l-3-3"/></svg>
        <span>Jump to…</span><kbd>/</kbd>
      </button>
      <button data-theme-toggle class="ps-themebtn"><span>Theme</span><span class="ps-themeval" data-theme-label>Light</span></button>
      <div class="ps-meter" data-meter></div>
      <p class="ps-note">{{SIDEBAR_FOOTNOTE}}</p>
    </div>
  </aside>

  <main class="ps-main" data-main>

    <!-- Mobile bar (only < 768px). "On this page" opens a sheet; ☰ the drawer. -->
    <div class="ps-topbar">
      <button class="ps-icon" data-nav-toggle aria-label="All pages" aria-expanded="false">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
      </button>
      <button class="ps-here" data-sheet-toggle aria-expanded="false">
        <small>On this page</small><b data-here></b>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>
      </button>
      <button class="ps-icon" data-theme-toggle aria-label="Toggle theme"><span data-theme-label>Light</span></button>
      <div class="ps-hair" data-progress></div>
    </div>

    <!-- ===================== PAGE HEADER ===================== -->
    <!-- The header IS the first section: give it an id + data-toc. -->
    <header id="overview" data-toc="{{NAV_LABEL}}" class="px-6 sm:px-10 lg:px-14 pt-12 pb-10 border-b border-slate-200 dark:border-slate-800">
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-violet-600 dark:text-violet-400">{{PAGE_KICKER}}</p>
      <h1 class="mt-3 text-3xl font-bold tracking-tight">{{HEADLINE}}<span class="text-slate-400 dark:text-slate-500"> — {{SUBHEAD}}</span></h1>
      <p class="mt-4 prose-measure text-[15px] leading-relaxed text-slate-600 dark:text-slate-300">
        {{LEDE}}
      </p>
    </header>

    <!-- ===================== A SECTION ===================== -->
    <!-- Every <section id data-toc="…"> becomes a sub-entry in the sidebar. -->
    <section id="sectionB" data-toc="{{NAV_LABEL}}" class="px-6 sm:px-10 lg:px-14 py-12 border-b border-slate-200 dark:border-slate-800 reveal">
      <h2 class="text-2xl font-bold tracking-tight">{{SECTION_TITLE}}</h2>
      <p class="mt-3 prose-measure text-[14px] leading-relaxed text-slate-600 dark:text-slate-300">{{SECTION_BODY}}</p>
      <!-- Build cards/tables/diagrams here with Tailwind utilities + the report.css
           component classes (.mbar/.delta/.sev/.statnum/.axis/.evi/.verified). -->
    </section>

  </main>
</div>
</body>
</html>
