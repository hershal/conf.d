# ~/.tmux.conf  — managed in ~/conf.d/tmux.conf, symlinked by update_links.
# Ported from ~/conf.d/screenrc for tmux >= 3.2.  Reload live with: prefix R.
# Prefix is Ctrl-\  (same key as screen's `escape ^\`).

### Prefix & keys      (screenrc: escape ^\ ; bind R) ----------------------
set  -g prefix  C-\\           # primary prefix    (screen's `escape ^\`)
set  -g prefix2 'C-`'         # second, one-handed prefix — TEST it (terminal may fold Ctrl-` to NUL)
unbind C-b
bind C-\\ last-window         # C-\ C-\  = toggle last window   (screen's "other"/alt-tab)
bind 'C-`' last-window        # C-` C-`  = same, one-handed
bind '\'  send-prefix         # prefix then  \  = send a literal C-\ to the inner app
bind R source-file ~/.tmux.conf \; display "tmux.conf reloaded"
# Window keys carry over under either prefix: c n p 0-9 d [ ] unchanged.
# Differ from screen: rename = 'A'  window-list = 'w'  single-key last-window = 'l'.
bind Space  next-window       # prefix Space     = next window      (overrides unused next-layout)
bind BSpace previous-window   # prefix Backspace = previous window
unbind ,
bind A command-prompt -I "#W" "rename-window '%%'"

### Session behavior   (screenrc: defscrollback ; msgwait) -----------------
set  -g history-limit 100000        # was: defscrollback 100000
set  -g display-time  2000          # was: msgwait 2   (tmux is milliseconds)
set  -g base-index    1             # windows start at 1 (matches the 1-9 reach)
setw -g pane-base-index 1
set  -g renumber-windows on         # close a window -> no gaps in numbering
set  -sg escape-time  0             # no Esc-key lag (matters in vim)
set  -g focus-events  on            # let vim/etc. see focus through tmux
# altscreen / autodetach / startup_message / defutf8 / nonblock:
#   all tmux defaults or N/A — intentionally no line.

### Terminal & color   (screenrc: term ; termcapinfo ; defbce ; attrcolor) -
set  -g default-terminal "tmux-256color"          # screen-256color-bce is gone; this is the modern base
set  -as terminal-features ",xterm-256color:RGB"  # 24-bit truecolor (upgrade over screen's 256)
# Your outer TERM is pinned to xterm-256color in bashrc, so the line above is exact.
# If some old box lacks tmux-256color terminfo, fall back to "screen-256color".
# defbce / attrcolor / ti@:te@ dropped — terminal-emulator's job, or N/A in tmux.

### Input: mouse, vi copy-mode, system clipboard --------------------------
set  -g mouse on                    # scroll / select / copy  (the claude fix)
set  -g mode-keys   vi              # PIN vi copy-mode — tmux's default secretly depends on $EDITOR
set  -g status-keys vi              # vi editing at the ':' command prompt too
set  -s set-clipboard on            # OSC52: copy-mode yanks -> your laptop clipboard, over SSH
# copy-mode-vi already matches screen muscle memory: Space = start selection, Enter = copy.

### Activity / bell    (screenrc: activity ; bell) ------------------------
set  -g monitor-activity on         # sets window_activity_flag on bg output — the done-dot's GATE
set  -g visual-activity  off        # no popup — the dot carries it
set  -g visual-silence   off        # no popup on silence either
setw -g window-status-activity-style default   # neutralized: the dot (status line below) renders state
# LIVE done-dot (every window). Driven by the activity TIMESTAMP, not the latched silence flag, so it
#   tracks output in real time (the dot itself lives on window-status-format in the Status section):
#     activity_flag 0           -> blank   (nothing printed since you last looked)
#     now - window_activity < N -> amber ● (output within the last N s = still working)
#     now - window_activity >=N -> green ● (had output, then quiet N s = done, left something for you)
#   New output flips green back to amber — the live behavior the old latched silence-flag dot couldn't do.
#   (monitor-silence is gone: the timestamp delta, not window_silence_flag, now decides green.)
set  -g @ds 5                       # done-dot threshold N (seconds); override per-window via prefix S
bind S command-prompt -p "done-dot secs:" -I "#{@ds}" "setw @ds '%%'"
# Jump to whatever lit up: prefix M-n (next-window -a).  bell: tmux defaults already cover screen's `bell`.

### Status line        (screenrc: hardstatus) — theme: FAITHFUL (chosen 2026-06-15)
set  -g status on
set  -g status-interval 2         # 2s redraw: the live done-dot needs frequent ticks (clock/load too)
set  -g status-justify  left
set  -g status-style    "bg=default,fg=colour244"               # quiet grey on the terminal background
set  -g status-left        "#[fg=colour110,bold] #S #[default]" # session name, far left
set  -g status-left-length 30
# --- done-dot --- needs tmux >= 3.3 format math (#{e|..}); older boxes (this config syncs via git)
#     fall back to the latched silence-flag dot so their status line never shows raw #{e|..} text.
%if "#{m/r:^([4-9]\.|3\.([3-9]|[1-9][0-9])),#{version}}"
  # @now = current epoch, refreshed every 1s by ONE background daemon per server. flock fd-guard
  #   (keyed on the server PID from $TMUX) => exactly one daemon even across `prefix R` reloads; the
  #   `while tmux set; do` loop self-exits the instant the server dies. tmux has no built-in clock var.
  set -gq @now 0
  run-shell -b 'sock=${TMUX%%,*}; spid=$(echo "$TMUX" | cut -d, -f2); exec 9>"/tmp/tmux-now-$spid.lock"; flock -n 9 || exit 0; while tmux -S "$sock" set -gq @now "$(date +%s)"; do sleep 1; done'
  setw -g window-status-format         " #{?window_activity_flag,#{?#{e|<:#{e|-:#{@now},#{window_activity}},#{@ds}},#[fg=colour214 bold]●#[default],#[fg=colour40 bold]●#[default]}, } #I#{?window_last_flag,-,} #W "
%else
  set -g monitor-silence 5   # < 3.3 fallback: latched dot. amber=had output; green=quiet (set once, clears on view)
  setw -g window-status-format         " #{?window_silence_flag,#{?window_activity_flag,#[fg=colour40 bold]●#[default], },#{?window_activity_flag,#[fg=colour214 bold]●#[default], }} #I#{?window_last_flag,-,} #W "
%endif
setw -g window-status-current-format "#[fg=colour231,bg=colour238,bold] #I #W #[default]"  # current = solid grey block (no '*' — the highlight IS the marker)
setw -g window-status-current-style  default
setw -g window-status-separator      ""
set  -g status-right "#[fg=colour110]#h #[fg=colour244] #(uptime | sed -e 's/.*: //' -e 's/,//g') %H:%M "  # short host · 3-val load · 24h clock
set  -g status-right-length 60
